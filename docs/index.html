<body>
<div id="root"><div id="boot"><div class="k">Loading demo</div><div>ML Monitoring Lite を起動中… 初回はPython実行環境の読み込みに数十秒かかります。</div></div></div>
<script type="module">
import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";
mount({"requirements": ["numpy", "scipy", "pandas", "altair"], "entrypoint": "app/streamlit_app.py", "files": {"app/streamlit_app.py": "\"\"\"ML Monitoring Lite — Streamlit エントリポイント。\n\nUI は薄く保ち、ドリフト計算は src/ に委譲する。\n実行: streamlit run app/streamlit_app.py\n\"\"\"\n\nfrom __future__ import annotations\n\nimport sys\nfrom pathlib import Path\n\nimport altair as alt\nimport numpy as np\nimport pandas as pd\nimport streamlit as st\n\nsys.path.insert(0, str(Path(__file__).resolve().parents[1]))\n\nfrom src.brand import (\n    apply_brand,\n    footer_backlink,\n    hero,\n    section,\n    sidebar_header,\n    themed_altair,\n    PALETTE,\n    show_table,\n)\nfrom src.drift import (\n    FEATURES,\n    drift_report,\n    generate_reference_and_current,\n)\n\nthemed_altair(alt)\n\nst.set_page_config(page_title=\"ML Monitoring Lite\", page_icon=\"📡\", layout=\"wide\")\napply_brand(st)\n\n\n@st.cache_data(show_spinner=False)\ndef _data(n: int, drift: float, seed: int):\n    return generate_reference_and_current(n=n, drift=drift, seed=seed)\n\n\ndef main() -> None:\n    sidebar_header(st, \"ML Monitoring Lite\")\n    n = st.sidebar.slider(\"サンプル数 / データセット\", 200, 5000, 2000, 100)\n    drift = st.sidebar.slider(\"ドリフト量\", 0.0, 2.0, 0.0, 0.1)\n    seed = st.sidebar.number_input(\"シード\", 0, 9999, 42, 1)\n    psi_th = st.sidebar.slider(\"PSI アラート閾値\", 0.1, 0.5, 0.25, 0.05)\n\n    hero(\n        st,\n        \"ML MONITORING\",\n        \"ML Monitoring Lite\",\n        \"学習時と推論時の分布差を PSI と KS 検定で検出し、データドリフト・品質監視・アラートの概念を示します。\",\n        chips=[\"Python\", \"SciPy\", \"Altair\", \"stlite\"],\n    )\n\n    ref, cur = _data(int(n), float(drift), int(seed))\n    report = drift_report(ref, cur, psi_threshold=float(psi_th))\n\n    n_alert = int(report[\"alert\"].sum())\n    c1, c2, c3, c4 = st.columns(4)\n    c1.metric(\"監視特徴量数\", len(report))\n    c2.metric(\"アラート数\", n_alert)\n    c3.metric(\"最大 PSI\", f\"{report['psi'].max():.3f}\")\n    c4.metric(\"ドリフト量\", f\"{drift:.1f}\")\n\n    if n_alert > 0:\n        st.warning(\n            f\"⚠️ {n_alert} 件の特徴量でドリフトを検出しました（PSI≥{psi_th}。KS 検定は参考指標）。\"\n        )\n    else:\n        st.success(\"現在ドリフトは検出されていません。サイドバーの『ドリフト量』を上げると変化します。\")\n\n    st.divider()\n    section(st, \"DRIFT METRICS\", \"ドリフト指標（特徴量別）\")\n    view = report.copy()\n    view[\"PSI\"] = view[\"psi\"].map(lambda x: f\"{x:.3f}\")\n    view[\"KS統計量\"] = view[\"ks_stat\"].map(lambda x: f\"{x:.3f}\")\n    view[\"KS p値\"] = view[\"ks_pvalue\"].map(lambda x: f\"{x:.4f}\")\n    view[\"判定\"] = view[\"level\"].map(\n        {\"stable\": \"🟢 stable\", \"moderate\": \"🟡 moderate\", \"significant\": \"🔴 significant\"}\n    )\n    view[\"アラート\"] = view[\"alert\"].map(lambda b: \"🚨\" if b else \"\")\n    view = view.rename(columns={\"feature\": \"特徴量\"})[\n        [\"特徴量\", \"PSI\", \"KS統計量\", \"KS p値\", \"判定\", \"アラート\"]\n    ]\n    show_table(st, view)\n\n    # --- PSI 棒グラフ（Altair）\n    section(st, \"PSI CHART\", \"PSI（特徴量別）\")\n    bar_df = report[[\"feature\", \"psi\"]].copy()\n    bar_df[\"alert\"] = bar_df[\"psi\"] >= float(psi_th)\n    psi_chart = (\n        alt.Chart(bar_df)\n        .mark_bar(cornerRadiusTopLeft=3, cornerRadiusTopRight=3)\n        .encode(\n            x=alt.X(\"psi:Q\", title=\"PSI\", scale=alt.Scale(zero=True)),\n            y=alt.Y(\"feature:N\", title=\"特徴量\", sort=\"-x\"),\n            color=alt.condition(\n                alt.datum.psi >= float(psi_th),\n                alt.value(PALETTE[2]),   # amber: アラート\n                alt.value(PALETTE[0]),   # teal: 正常\n            ),\n            tooltip=[\n                alt.Tooltip(\"feature:N\", title=\"特徴量\"),\n                alt.Tooltip(\"psi:Q\", title=\"PSI\", format=\".3f\"),\n            ],\n        )\n        .properties(height=220)\n    )\n    threshold_rule = (\n        alt.Chart(pd.DataFrame({\"threshold\": [float(psi_th)]}))\n        .mark_rule(strokeDash=[4, 4])\n        .encode(x=alt.X(\"threshold:Q\"))\n    )\n    st.altair_chart(psi_chart + threshold_rule, use_container_width=True)\n\n    # --- 分布比較（Altair 折れ線）\n    section(st, \"DISTRIBUTION\", \"分布比較\")\n    pick = st.selectbox(\"特徴量を選択\", FEATURES)\n    bins = np.linspace(\n        min(ref[pick].min(), cur[pick].min()),\n        max(ref[pick].max(), cur[pick].max()),\n        30,\n    )\n    ref_h, _ = np.histogram(ref[pick].to_numpy(), bins=bins)\n    cur_h, _ = np.histogram(cur[pick].to_numpy(), bins=bins)\n    centers = (bins[:-1] + bins[1:]) / 2\n    dist_df = (\n        pd.DataFrame(\n            {\"値\": np.round(centers, 2), \"基準\": ref_h, \"現在\": cur_h}\n        )\n        .melt(id_vars=\"値\", var_name=\"データセット\", value_name=\"件数\")\n    )\n    dist_chart = (\n        alt.Chart(dist_df)\n        .mark_line(strokeWidth=2.5)\n        .encode(\n            x=alt.X(\"値:Q\", title=\"値\"),\n            y=alt.Y(\"件数:Q\", title=\"件数\", scale=alt.Scale(zero=True)),\n            color=alt.Color(\n                \"データセット:N\",\n                scale=alt.Scale(domain=[\"基準\", \"現在\"], range=[PALETTE[0], PALETTE[1]]),\n            ),\n            tooltip=[\n                \"データセット:N\",\n                alt.Tooltip(\"値:Q\", format=\".2f\"),\n                \"件数:Q\",\n            ],\n        )\n        .properties(height=280)\n    )\n    st.altair_chart(dist_chart, use_container_width=True)\n\n    st.divider()\n    footer_backlink(st, repo=\"ml-monitoring-lite\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "src/__init__.py": "", "src/brand.py": "\"\"\"Portfolio Design System v2 \"Ink & Signal\" — Streamlit 共通ブランドテーマ。\n\nportfolio-hub と12デモで視覚言語を揃える単一ファイル。外部依存なし。\n正典: portfolio-plan/brand/brand.py（各リポの src/brand.py へそのままコピーする）\n仕様: portfolio-plan/design-system.md\n\n各アプリの ``streamlit_app.py`` から::\n\n    from src.brand import apply_brand, hero, section, sidebar_header, footer_backlink\n    apply_brand(st)                      # set_page_config の後に一度だけ\n    hero(st, \"KICKER\", \"タイトル\", \"サブ説明\", chips=[\"python\", \"altair\"])\n    ...\n    footer_backlink(st, repo=\"rag-eval-dashboard\")\n\nAltair を使うアプリは import 直後に::\n\n    import altair as alt\n    from src.brand import themed_altair\n    themed_altair(alt)\n\nPlotly を使うアプリは figure ごとに::\n\n    fig.update_layout(**plotly_template())\n\"\"\"\n\nfrom __future__ import annotations\n\nPALETTE = [\"#0f766e\", \"#2563eb\", \"#d97706\", \"#be185d\", \"#7c3aed\", \"#64748b\"]\n\n_FONT_BODY = \"'Inter', 'Noto Sans JP', system-ui, sans-serif\"\n_FONT_DISPLAY = \"'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif\"\n_FONT_MONO = \"'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace\"\n\n_BRAND_CSS = \"\"\"\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');\n/* stlite は Material Symbols を同梱しないため明示ロード（expander 矢印等の豆腐化防止） */\n@import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block');\n\n:root {\n  --bg:#f6f7f9; --fg:#0d1526; --muted:#5b6474;\n  --surface:#ffffff;\n  --line:rgba(13,21,38,0.10); --line-strong:rgba(13,21,38,0.20);\n  --accent:#0f766e; --accent-strong:#115e59; --link:#2563eb; --dark:#0b1220;\n  --shadow:0 1px 2px rgba(13,21,38,.05), 0 8px 24px rgba(13,21,38,.06);\n  --shadow-hover:0 2px 4px rgba(13,21,38,.06), 0 16px 40px rgba(13,21,38,.10);\n}\n\n/* typography（アイコンフォントは触らない） */\nhtml, body, .stApp, .stMarkdown, p, li,\nspan:not([data-testid=\"stIconMaterial\"]):not([class*=\"material-symbols\"]),\nlabel, button, input, textarea, select,\n[data-testid=\"stWidgetLabel\"], [data-testid=\"stMetricLabel\"] {\n  font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif;\n}\n/* Material Symbols のリガチャを死守（expander 矢印等） */\n[data-testid=\"stIconMaterial\"], [class*=\"material-symbols\"] {\n  font-family: 'Material Symbols Rounded' !important;\n}\nh1, h2, h3, h4 {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n}\ncode, pre, kbd,\n[data-testid=\"stMetricValue\"], [data-testid=\"stMetricDelta\"] {\n  font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;\n  font-variant-numeric: tabular-nums;\n}\n\n/* 背景：ほぼ無地＋上部にごく薄い teal の気配 */\n.stApp {\n  background:\n    radial-gradient(1200px 480px at 50% -160px, rgba(15,118,110,0.07), transparent 70%),\n    #f6f7f9;\n  color: var(--fg);\n}\n\n/* Streamlit クロームを控えめに */\nheader[data-testid=\"stHeader\"] { background: transparent; }\n[data-testid=\"stToolbar\"], #MainMenu, footer { visibility: hidden; height: 0; }\n[data-testid=\"stDecoration\"] { display: none; }\n\n/* 本文幅と余白 */\n.block-container, [data-testid=\"stMainBlockContainer\"] {\n  max-width: 1180px; padding-top: 2.4rem; padding-bottom: 3rem;\n}\n\n/* 見出し */\nh1 { font-weight: 700 !important; letter-spacing: -0.03em; line-height: 1.08; color: var(--fg); }\nh2 { font-weight: 700 !important; letter-spacing: -0.02em; color: var(--fg); }\nh3 { font-weight: 700 !important; letter-spacing: -0.01em; color: var(--fg); }\n\n/* Hero ブロック */\n.brand-hero { margin: 4px 0 34px; }\n.brand-kicker {\n  color: var(--accent); font-size: .75rem; font-weight: 700;\n  letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px;\n}\n.brand-title {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n  font-size: clamp(2.1rem, 4.5vw, 3.2rem); font-weight: 700;\n  line-height: 1.08; letter-spacing: -0.03em; color: var(--fg); margin: 0;\n}\n.brand-sub {\n  color: var(--muted); font-size: 1rem; line-height: 1.8;\n  margin-top: 14px; max-width: 760px;\n}\n.brand-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }\n.brand-chip {\n  border: 1px solid var(--line); border-radius: 999px; background: var(--surface);\n  padding: 4px 12px; color: var(--muted); font-size: .78rem; font-weight: 600;\n  font-family: 'IBM Plex Mono', ui-monospace, monospace;\n}\n\n/* セクション見出し */\n.brand-section { margin: 34px 0 6px; }\n.brand-section .brand-kicker { margin-bottom: 6px; }\n.brand-section-title {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n  font-size: 1.45rem; font-weight: 700; letter-spacing: -0.02em;\n  color: var(--fg); margin: 0;\n}\n\n/* サイドバー：不透明サーフェス */\n[data-testid=\"stSidebar\"] {\n  background: #fbfcfd;\n  border-right: 1px solid var(--line);\n}\n.brand-side-title {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n  font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em;\n  color: var(--fg); margin: 2px 0 2px;\n}\n\n/* metric をカード化（左に accent の芯） */\n[data-testid=\"stMetric\"] {\n  background: var(--surface);\n  border: 1px solid var(--line); border-left: 3px solid var(--accent);\n  border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow);\n}\n[data-testid=\"stMetricValue\"] { color: var(--fg); font-weight: 600; }\n[data-testid=\"stMetricLabel\"] {\n  color: var(--muted); font-size: .74rem; font-weight: 600;\n  letter-spacing: .08em; text-transform: uppercase;\n}\n\n/* ボタン */\n.stButton > button, .stDownloadButton > button, .stFormSubmitButton > button {\n  border-radius: 10px; border: 1px solid var(--fg); background: var(--fg);\n  color: #fff; font-weight: 600; padding: 8px 18px;\n  transition: transform .15s ease, background .15s ease, box-shadow .15s ease;\n}\n.stButton > button:hover, .stDownloadButton > button:hover,\n.stFormSubmitButton > button:hover {\n  background: var(--dark); border-color: var(--dark); color: #fff;\n  transform: translateY(-1px); box-shadow: var(--shadow);\n}\n\n/* タブ */\n.stTabs [data-baseweb=\"tab-list\"] { gap: 4px; border-bottom: 1px solid var(--line); }\n.stTabs [data-baseweb=\"tab\"] { font-weight: 600; color: var(--muted); }\n.stTabs [aria-selected=\"true\"] { color: var(--accent-strong); }\n\n/* 表・expander をカード化 */\n[data-testid=\"stDataFrame\"], [data-testid=\"stTable\"] {\n  border: 1px solid var(--line); border-radius: 12px; overflow: hidden;\n  box-shadow: var(--shadow); background: var(--surface);\n}\n[data-testid=\"stExpander\"] {\n  border: 1px solid var(--line); border-radius: 12px;\n  background: var(--surface); box-shadow: var(--shadow);\n}\n\n/* 入力の角丸 */\n[data-baseweb=\"select\"] > div, .stTextInput input, .stTextArea textarea,\n.stNumberInput input { border-radius: 10px !important; }\n\n/* 通知・区切り・リンク */\n[data-testid=\"stNotification\"], .stAlert { border-radius: 10px; }\nhr { border-color: var(--line); }\na { color: var(--link); }\n\n/* 静的テーブル（st.dataframe の stlite 代替） */\n.brand-table-wrap {\n  overflow-x: auto; border: 1px solid var(--line); border-radius: 12px;\n  background: var(--surface); box-shadow: var(--shadow);\n}\n.brand-table { width: 100%; border-collapse: collapse; font-size: .88rem; }\n.brand-table th {\n  text-align: left; color: var(--muted); font-size: .72rem; font-weight: 600;\n  letter-spacing: .06em; text-transform: uppercase;\n  padding: 10px 14px; border-bottom: 1px solid var(--line-strong); background: #fbfcfd;\n}\n.brand-table td {\n  padding: 9px 14px; border-bottom: 1px solid var(--line);\n  color: var(--fg); font-variant-numeric: tabular-nums;\n}\n.brand-table tr:last-child td { border-bottom: none; }\n\n/* フッター */\n.brand-footer {\n  margin-top: 48px; padding-top: 18px; border-top: 1px solid var(--line);\n  display: flex; flex-wrap: wrap; gap: 8px 20px;\n  align-items: center; justify-content: space-between;\n  color: var(--muted); font-size: .82rem; line-height: 1.7;\n}\n.brand-footer a { color: var(--accent-strong); font-weight: 600; text-decoration: none; }\n.brand-footer a:hover { text-decoration: underline; }\n</style>\n\"\"\"\n\nHUB_URL = \"https://oishizawads.github.io/portfolio-hub/\"\nGITHUB_OWNER = \"oishizawads\"\n\n\ndef apply_brand(st) -> None:\n    \"\"\"ブランド CSS を注入する。``st.set_page_config`` の後に一度だけ呼ぶ。\"\"\"\n    st.markdown(_BRAND_CSS, unsafe_allow_html=True)\n\n\ndef _esc(text: str) -> str:\n    return (\n        str(text)\n        .replace(\"&\", \"&amp;\")\n        .replace(\"<\", \"&lt;\")\n        .replace(\">\", \"&gt;\")\n    )\n\n\ndef hero(\n    st,\n    kicker: str,\n    title: str,\n    subtitle: str | None = None,\n    chips: list[str] | None = None,\n) -> None:\n    \"\"\"ヒーロー見出し（キッカー + 大見出し + サブ説明 + 技術チップ）。\"\"\"\n    html = (\n        '<div class=\"brand-hero\">'\n        f'<div class=\"brand-kicker\">{_esc(kicker)}</div>'\n        f'<div class=\"brand-title\">{_esc(title)}</div>'\n    )\n    if subtitle:\n        html += f'<div class=\"brand-sub\">{_esc(subtitle)}</div>'\n    if chips:\n        html += '<div class=\"brand-chips\">'\n        html += \"\".join(f'<span class=\"brand-chip\">{_esc(c)}</span>' for c in chips)\n        html += \"</div>\"\n    html += \"</div>\"\n    st.markdown(html, unsafe_allow_html=True)\n\n\ndef section(st, kicker: str, title: str) -> None:\n    \"\"\"本文セクション見出し（kicker + タイトル）。``st.header`` の代替。\"\"\"\n    st.markdown(\n        '<div class=\"brand-section\">'\n        f'<div class=\"brand-kicker\">{_esc(kicker)}</div>'\n        f'<div class=\"brand-section-title\">{_esc(title)}</div>'\n        \"</div>\",\n        unsafe_allow_html=True,\n    )\n\n\ndef sidebar_header(st, title: str, caption: str | None = None) -> None:\n    \"\"\"サイドバー先頭の見出し。\"\"\"\n    html = (\n        '<div class=\"brand-kicker\" style=\"margin-top:4px\">Controls</div>'\n        f'<div class=\"brand-side-title\">{_esc(title)}</div>'\n    )\n    st.sidebar.markdown(html, unsafe_allow_html=True)\n    if caption:\n        st.sidebar.caption(caption)\n\n\ndef footer_backlink(st, repo: str | None = None) -> None:\n    \"\"\"合成データ注記と Portfolio Hub への戻りリンクを持つ共通フッター。\"\"\"\n    links = f'<a href=\"{HUB_URL}\">← Portfolio Hub</a>'\n    if repo:\n        links += (\n            f' &nbsp; <a href=\"https://github.com/{GITHUB_OWNER}/{_esc(repo)}\">'\n            \"GitHub ↗</a>\"\n        )\n    st.markdown(\n        '<div class=\"brand-footer\">'\n        \"<span>Synthetic data demo — 数値はすべて合成データで、実在の精度・効果を示しません。</span>\"\n        f\"<span>{links}</span>\"\n        \"</div>\",\n        unsafe_allow_html=True,\n    )\n\n\ndef show_table(st, df, hide_index: bool = True, float_fmt: str | None = None) -> None:\n    \"\"\"静的 HTML テーブルとして描画する。\n\n    stlite 1.8 系では st.dataframe（glide-data-grid）が空描画になるため、\n    デモの一覧表示はこのヘルパーで代替する。\n    \"\"\"\n    data = df.copy()\n    if float_fmt:\n        for col in data.columns:\n            if getattr(data[col].dtype, \"kind\", \"\") == \"f\":\n                data[col] = data[col].map(lambda v: float_fmt.format(v))\n    html = data.to_html(index=not hide_index, classes=\"brand-table\", border=0)\n    st.markdown(f'<div class=\"brand-table-wrap\">{html}</div>', unsafe_allow_html=True)\n\n\ndef altair_config() -> dict:\n    \"\"\"ブランド仕様の Altair テーマ設定を返す。\"\"\"\n    return {\n        \"config\": {\n            \"background\": \"transparent\",\n            \"font\": _FONT_BODY,\n            \"range\": {\"category\": PALETTE},\n            \"axis\": {\n                \"labelFont\": _FONT_BODY,\n                \"titleFont\": _FONT_BODY,\n                \"labelColor\": \"#5b6474\",\n                \"titleColor\": \"#0d1526\",\n                \"titleFontWeight\": 600,\n                \"labelFontSize\": 12,\n                \"titleFontSize\": 12,\n                \"gridColor\": \"rgba(13,21,38,0.08)\",\n                \"domainColor\": \"rgba(13,21,38,0.20)\",\n                \"tickColor\": \"rgba(13,21,38,0.20)\",\n            },\n            \"legend\": {\n                \"labelFont\": _FONT_BODY,\n                \"titleFont\": _FONT_BODY,\n                \"labelColor\": \"#5b6474\",\n                \"titleColor\": \"#0d1526\",\n            },\n            \"title\": {\n                \"font\": _FONT_DISPLAY,\n                \"color\": \"#0d1526\",\n                \"fontSize\": 15,\n                \"fontWeight\": 700,\n                \"anchor\": \"start\",\n            },\n            \"view\": {\"stroke\": \"transparent\"},\n            \"bar\": {\"color\": PALETTE[0]},\n            \"line\": {\"color\": PALETTE[0], \"strokeWidth\": 2.5},\n            \"point\": {\"color\": PALETTE[0], \"filled\": True, \"size\": 70},\n            \"area\": {\"color\": PALETTE[0], \"opacity\": 0.16, \"line\": True},\n            \"rule\": {\"color\": \"#5b6474\"},\n        }\n    }\n\n\ndef themed_altair(alt) -> None:\n    \"\"\"Altair にブランドテーマを登録して有効化する（バージョン差異を吸収）。\"\"\"\n    theme = altair_config\n\n    try:  # altair >= 5.5\n        alt.theme.register(\"brand\", enable=True)(theme)\n        return\n    except Exception:\n        pass\n    try:  # altair < 5.5\n        alt.themes.register(\"brand\", theme)\n        alt.themes.enable(\"brand\")\n    except Exception:\n        pass\n\n\ndef set_plotly_theme() -> None:\n    \"\"\"plotly express が色を焼き込む前にブランドテンプレートを既定化する。\n\n    figure 生成より前（import 直後）に一度だけ呼ぶ。\n    \"\"\"\n    import plotly.graph_objects as go\n    import plotly.io as pio\n\n    pio.templates[\"brand\"] = go.layout.Template(layout=plotly_template())\n    pio.templates.default = \"plotly_white+brand\"\n\n\ndef plotly_template() -> dict:\n    \"\"\"``fig.update_layout(**plotly_template())`` で適用する共通レイアウト。\"\"\"\n    grid = \"rgba(13,21,38,0.08)\"\n    zero = \"rgba(13,21,38,0.20)\"\n    return {\n        \"font\": {\"family\": \"Inter, Noto Sans JP, sans-serif\", \"color\": \"#0d1526\", \"size\": 13},\n        \"paper_bgcolor\": \"rgba(0,0,0,0)\",\n        \"plot_bgcolor\": \"rgba(0,0,0,0)\",\n        \"colorway\": PALETTE,\n        \"xaxis\": {\"gridcolor\": grid, \"zerolinecolor\": zero, \"linecolor\": zero},\n        \"yaxis\": {\"gridcolor\": grid, \"zerolinecolor\": zero, \"linecolor\": zero},\n        \"legend\": {\"bgcolor\": \"rgba(0,0,0,0)\"},\n        \"margin\": {\"t\": 48, \"r\": 16, \"b\": 48, \"l\": 56},\n        \"hoverlabel\": {\"font\": {\"family\": \"Inter, Noto Sans JP, sans-serif\"}},\n    }\n", "src/drift.py": "\"\"\"データドリフト検出のロジック（PSI / KS 検定）。\n\nUI から切り離した純粋関数のみ。すべて合成データ（seed 固定で再現可能）。\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\n\nimport numpy as np\nimport pandas as pd\nfrom scipy.stats import ks_2samp\n\nFEATURES = [\"feature_a\", \"feature_b\", \"feature_c\", \"feature_d\"]\n\n\ndef _clean(x: np.ndarray) -> np.ndarray:\n    x = np.asarray(x, dtype=float)\n    return x[~np.isnan(x)]\n\n\ndef psi(expected: np.ndarray, actual: np.ndarray, bins: int = 10) -> float:\n    \"\"\"Population Stability Index。基準 expected の分位でビン化して算出。\n\n    同一分布なら 0 付近、ズレが大きいほど増加する。空・定数列でも落ちない（0 を返す）。\n    \"\"\"\n    expected = _clean(expected)\n    actual = _clean(actual)\n    if expected.size == 0 or actual.size == 0:\n        return 0.0\n    quantiles = np.linspace(0.0, 1.0, bins + 1)\n    cuts = np.unique(np.quantile(expected, quantiles))\n    if cuts.size < 2:  # 定数列\n        return 0.0\n    cuts = cuts.astype(float)\n    cuts[0], cuts[-1] = -np.inf, np.inf\n    e_counts = np.histogram(expected, bins=cuts)[0].astype(float)\n    a_counts = np.histogram(actual, bins=cuts)[0].astype(float)\n    e_pct = e_counts / e_counts.sum()\n    a_pct = a_counts / a_counts.sum()\n    eps = 1e-6\n    e_pct = np.clip(e_pct, eps, None)\n    a_pct = np.clip(a_pct, eps, None)\n    return float(np.sum((a_pct - e_pct) * np.log(a_pct / e_pct)))\n\n\ndef ks_test(expected: np.ndarray, actual: np.ndarray) -> tuple[float, float]:\n    \"\"\"KS 統計量と p 値を返す。空・定数で計算不能なら (0.0, 1.0)。\"\"\"\n    expected = _clean(expected)\n    actual = _clean(actual)\n    if expected.size == 0 or actual.size == 0:\n        return (0.0, 1.0)\n    try:\n        res = ks_2samp(expected, actual)\n        return (float(res.statistic), float(res.pvalue))\n    except Exception:  # pragma: no cover - scipy 側の保険\n        return (0.0, 1.0)\n\n\ndef psi_level(value: float) -> str:\n    \"\"\"PSI を業界慣行の3段階に分類する。\"\"\"\n    if value < 0.1:\n        return \"stable\"\n    if value < 0.25:\n        return \"moderate\"\n    return \"significant\"\n\n\n@dataclass(frozen=True)\nclass DriftRow:\n    feature: str\n    psi: float\n    ks_stat: float\n    ks_pvalue: float\n    level: str\n    alert: bool\n\n\ndef drift_report(\n    reference: pd.DataFrame,\n    current: pd.DataFrame,\n    psi_threshold: float = 0.25,\n) -> pd.DataFrame:\n    \"\"\"特徴量ごとの PSI・KS・アラート判定をまとめて返す。\"\"\"\n    features = [c for c in reference.columns if c in current.columns]\n    rows: list[dict] = []\n    for f in features:\n        p = psi(reference[f].to_numpy(), current[f].to_numpy())\n        ks_stat, ks_p = ks_test(reference[f].to_numpy(), current[f].to_numpy())\n        # アラートは PSI（閾値スライダー連動）を主判定にする。\n        # KS は大サンプルで偽陽性を出しやすいため参考情報に留め、\n        # KS が極めて有意（p<0.001）な場合のみ補助的にアラートへ加える。\n        alert = (p >= psi_threshold) or (ks_p < 0.001 and p >= psi_threshold * 0.5)\n        rows.append(\n            {\n                \"feature\": f, \"psi\": p, \"ks_stat\": ks_stat,\n                \"ks_pvalue\": ks_p, \"level\": psi_level(p), \"alert\": alert,\n            }\n        )\n    return pd.DataFrame(rows, columns=[\"feature\", \"psi\", \"ks_stat\", \"ks_pvalue\", \"level\", \"alert\"])\n\n\ndef generate_reference_and_current(\n    n: int = 2000, drift: float = 0.0, seed: int = 42\n) -> tuple[pd.DataFrame, pd.DataFrame]:\n    \"\"\"基準データと現在データを合成する。drift（0〜）が大きいほど分布がずれる。\"\"\"\n    rng = np.random.default_rng(seed)\n    ref = pd.DataFrame(\n        {\n            \"feature_a\": rng.normal(0.0, 1.0, n),\n            \"feature_b\": rng.gamma(2.0, 2.0, n),\n            \"feature_c\": rng.normal(50.0, 10.0, n),\n            \"feature_d\": rng.beta(2.0, 5.0, n),\n        }\n    )\n    cur = pd.DataFrame(\n        {\n            # 平均シフト・分散拡大でドリフトを注入\n            \"feature_a\": rng.normal(0.0 + drift * 1.0, 1.0 + drift * 0.3, n),\n            \"feature_b\": rng.gamma(2.0 + drift * 1.5, 2.0, n),\n            \"feature_c\": rng.normal(50.0 + drift * 8.0, 10.0, n),\n            \"feature_d\": rng.beta(2.0, max(0.3, 5.0 - drift * 2.0), n),\n        }\n    )\n    return ref, cur\n", ".streamlit/config.toml": "# Portfolio Design System v2 — 共通 Streamlit テーマ（正典: portfolio-plan/brand/config.toml）\n[theme]\nbase = \"light\"\nprimaryColor = \"#0f766e\"\nbackgroundColor = \"#f6f7f9\"\nsecondaryBackgroundColor = \"#ffffff\"\ntextColor = \"#0d1526\"\nfont = \"sans serif\"\n"}}, document.getElementById("root"));
</script>
</body>
